
name: Build RustDesk Flutter Linux
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Importante para los submódulos de RustDesk

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev build-essential curl git libasound2-dev \
          libc6-dev libcap-dev libcmake-util-dev libdbus-1-dev libgstreamer-plugins-base1.0-dev \
          libgstreamer1.0-dev libgtk-3-dev liblzma-dev libpam0g-dev libpango1.0-dev \
          libpulse-dev libva-dev libvdpau-dev libvpx-dev libx11-dev libxcb-randr0-dev \
          libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxi-dev \
          libxkbcommon-dev libxrandr-dev libxtst-dev llvm-dev nasm ninja-build \
          unzip wget yasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # O la versión que indique el archivo pubspec.yaml
          channel: 'stable'

      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg
          ./vcpkg/bootstrap-vcpkg.sh
          export VCPKG_ROOT=$(pwd)/vcpkg
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          # Instalar librerías críticas
          $VCPKG_ROOT/vcpkg install libvpx libyuv opus aom

      - name: Build Bridge and Dependencies
        run: |
          # RustDesk Flutter suele requerir generar el bridge antes
          cargo install flutter_rust_bridge_codegen
          # Nota: Los comandos exactos pueden variar según tu versión modificada
          # Usualmente es: flutter pub get
          flutter pub get

      - name: Build Flutter App
        run: |
          # Compilación final para Linux
          flutter build linux --release

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-flutter-linux
          path: build/linux/x64/release/bundle/
