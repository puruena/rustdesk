
name: Build RustDesk Modified (Flutter Version)

on:
  workflow_dispatch: # Esto permite que le des al botón "Run Workflow" manualmente

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    
    # Solución para las advertencias de Node.js deprecado
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev build-essential curl git libasound2-dev \
          libcap-dev cmake pkg-config libdbus-1-dev libgstreamer-plugins-base1.0-dev \
          libgstreamer1.0-dev libgtk-3-dev liblzma-dev libpam0g-dev libpango1.0-dev \
          libpulse-dev libva-dev libvdpau-dev libvpx-dev libx11-dev libxcb-randr0-dev \
          libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxi-dev \
          libxkbcommon-dev libxrandr-dev libxtst-dev llvm-dev nasm ninja-build \
          unzip wget yasm libclang-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Nota: RustDesk suele requerir Flutter 3.16 o superior

      - name: Install vcpkg and Libraries
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg
            ./vcpkg/bootstrap-vcpkg.sh
          fi
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV
          ./vcpkg/vcpkg install libvpx libyuv opus aom

      - name: Prepare Bridge & Dependencies
        run: |
          # Instalamos el generador de código para el puente entre Rust y Flutter
          cargo install flutter_rust_bridge_codegen --version 1.80.0
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # Descargamos dependencias de Dart
          flutter pub get
          
          # Generamos los archivos del puente (Bridge)
          # Si tu archivo principal de rust no está en src/main.rs, ajusta esta ruta:
          flutter_rust_bridge_codegen --rust-input src/main.rs --dart-output lib/bridge_generated.dart || echo "Saltando paso de bridge si no es necesario"

      - name: Build Flutter App (Release)
        run: |
          flutter clean
          flutter build linux --release

      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Modified-Linux
          path: build/linux/x64/release/bundle/
