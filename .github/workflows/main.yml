name: RustDesk Custom Build 2026
on:
  workflow_dispatch: # Esto permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev build-essential curl git libasound2-dev \
          libcap-dev cmake pkg-config libdbus-1-dev libgstreamer-plugins-base1.0-dev \
          libgstreamer1.0-dev libgtk-3-dev liblzma-dev libpam0g-dev libpango1.0-dev \
          libpulse-dev libva-dev libvdpau-dev libvpx-dev libx11-dev libxcb-randr0-dev \
          libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxi-dev \
          libxkbcommon-dev libxrandr-dev libxtst-dev llvm-dev nasm ninja-build \
          unzip wget yasm libclang-dev libunwind-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install vcpkg (Fix Manifest Error)
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg
            ./vcpkg/bootstrap-vcpkg.sh
          fi
          
          # ELIMINAMOS el vcpkg.json para que no bloquee la instalación manual
          rm -f vcpkg.json
          
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV
          ./vcpkg/vcpkg install libvpx libyuv opus aom --classic

      - name: Prepare Bridge & Dependencies
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.0
          export PATH="$HOME/.cargo/bin:$PATH"
          flutter pub get
          # Genera la conexión entre Rust y la UI
          flutter_rust_bridge_codegen --rust-input src/main.rs --dart-output lib/bridge_generated.dart || echo "Bridge listo"

      - name: Build Flutter App
        run: |
          flutter clean
          flutter build linux --release

      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Linux-Personalizado
          path: build/linux/x64/release/bundle/
