name: RustDesk Build 2026 Final

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      # Aceleramos la compilación de Rust
      CARGO_NET_RETRY: 10
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev build-essential curl git libasound2-dev \
            libcap-dev cmake pkg-config libdbus-1-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libgtk-3-dev liblzma-dev libpam0g-dev libpango1.0-dev \
            libpulse-dev libva-dev libvdpau-dev libvpx-dev libx11-dev libxcb-randr0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxi-dev \
            libxkbcommon-dev libxrandr-dev libxtst-dev llvm-dev nasm ninja-build \
            unzip wget yasm libclang-dev libunwind-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fix vcpkg
        run: |
          rm -f vcpkg.json
          if [ ! -d "vcpkg" ]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh
        working-directory: ${{ github.workspace }}

      - name: Install and Run Bridge Codegen
        run: |
          # Instalamos la herramienta
          cargo install flutter_rust_bridge_codegen --version 1.80.0
          
          mkdir -p ./lib
          
          # Comando simplificado al máximo para evitar errores de flags
          $HOME/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./libs/hbb_common/src/lib.rs \
            --dart-output ./lib/generated_bridge.dart \
            --skip-deps-check
        working-directory: ${{ github.workspace }}

      - name: Build Rust Core (Release)
        run: |
          # Este paso tardará entre 15 y 30 minutos
          cargo build --release
        working-directory: ${{ github.workspace }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-binary
          path: target/release/rustdesk
