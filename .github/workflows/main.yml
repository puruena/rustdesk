
name: RustDesk Build Fix 2026

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev build-essential curl git libasound2-dev \
            libcap-dev cmake pkg-config libdbus-1-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libgtk-3-dev liblzma-dev libpam0g-dev libpango1.0-dev \
            libpulse-dev libva-dev libvdpau-dev libvpx-dev libx11-dev libxcb-randr0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxi-dev \
            libxkbcommon-dev libxrandr-dev libxtst-dev llvm-dev nasm ninja-build \
            unzip wget yasm libclang-dev libunwind-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fix vcpkg and Manifest Mode
        run: |
          # Eliminamos vcpkg.json para evitar conflictos de modo manifiesto
          rm -f vcpkg.json
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh
        working-directory: ${{ github.workspace }}

      - name: Install and Run flutter_rust_bridge_codegen
        run: |
          # Instalamos la versión específica necesaria
          cargo install flutter_rust_bridge_codegen --version 1.80.0
          
          # Aseguramos que la carpeta de salida para Dart existe
          mkdir -p ./lib
          
          # Ejecutamos el generador con --skip-deps para evitar errores con tipos complejos de tokio
          $HOME/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./libs/hbb_common/src/lib.rs \
            --dart-output ./lib/generated_bridge.dart \
            --skip-deps
        working-directory: ${{ github.workspace }}

      - name: Build Rust Core
        run: |
          # Compilación principal (este paso es el más lento)
          cargo build --release
        working-directory: ${{ github.workspace }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-binary
          path: target/release/rustdesk
