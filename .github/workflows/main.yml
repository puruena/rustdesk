name: RustDesk Build Final 2026

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      # Ignoramos errores de generación y vamos a lo importante
      SKIP_FLUTTER_BRIDGE: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev build-essential curl git libasound2-dev \
            libcap-dev cmake pkg-config libdbus-1-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev libgtk-3-dev liblzma-dev libpam0g-dev libpango1.0-dev \
            libpulse-dev libva-dev libvdpau-dev libvpx-dev libx11-dev libxcb-randr0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxi-dev \
            libxkbcommon-dev libxrandr-dev libxtst-dev llvm-dev nasm ninja-build \
            unzip wget yasm libclang-dev libunwind-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fix vcpkg
        run: |
          rm -f vcpkg.json
          if [ ! -d "vcpkg" ]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh
        working-directory: ${{ github.workspace }}

      - name: Pre-build Configuration
        run: |
          # Creamos el directorio lib si no existe para que cargo no se queje
          mkdir -p ./lib
          # Generamos un archivo vacío si es necesario para engañar al compilador
          touch ./lib/generated_bridge.dart
        working-directory: ${{ github.workspace }}

      - name: Build Rust Core (The Real Deal)
        run: |
          # Compilamos el binario de Rust directamente. 
          # Esto ignorará el problema del bridge de Flutter si solo buscas el núcleo.
          cargo build --release
        working-directory: ${{ github.workspace }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-binary
          path: target/release/rustdesk
